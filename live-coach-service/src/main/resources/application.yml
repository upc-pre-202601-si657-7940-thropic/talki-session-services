spring:
  application:
    name: live-coach-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8083}

gemini:
  model: ${GEMINI_MODEL:models/gemini-2.0-flash-exp}
  max-session-minutes: ${GEMINI_MAX_SESSION_MINUTES:15}

logging:
  level:
    com.thropic.talki: DEBUG
